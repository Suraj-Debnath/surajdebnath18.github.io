<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator page</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <section class="header">

        <div class="heading">
            <h1>Calculator</h1>
        </div>

        <div class="calculator">
            <div class="calculator-2">
                <div class="calculation" id="display"></div>

                    <div class="equipment">

                        <div class="equipments">C</div>
                        <div class="equipments">%</div>
                        <div class="equipments">🗑</div>
                        <div class="equipments">➗</div>

                        <div class="equipments">7</div>
                        <div class="equipments">8</div>
                        <div class="equipments">9</div>
                        <div class="equipments">⛌</div>

                        <div class="equipments">4</div>
                        <div class="equipments">5</div>
                        <div class="equipments">6</div>
                        <div class="equipments">-</div>

                        <div class="equipments">1</div>
                        <div class="equipments">2</div>
                        <div class="equipments">3</div>
                        <div class="equipments">+</div>

                        <div class="equipments">M</div>
                        <div class="equipments">0</div>
                        <div class="equipments">.</div>
                        <div class="equipments">=</div>
                    </div>

                </div>
            </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
